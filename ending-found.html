<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGNAL FOUND</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/game-frame.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #000;
        color: #e8e8f0;
        font-family: "Courier New", monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px;
        text-align: center;
      }
      #stage {
        max-width: 34rem;
        line-height: 1.65;
      }
      .sub {
        margin-top: 1.5rem;
        color: #9898b0;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <p id="line1"></p>
      <p class="sub" id="line2">they'll hear it. somehow.</p>
      <p class="sub" id="finalEcho"></p>
    </div>
    <script src="js/gameFrame.js"></script>
    <script src="js/state.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/ending.js"></script>
    <script>
      (function () {
        var el = document.getElementById("stage");
        document.getElementById("line1").textContent =
          window.SignalLostEnding.readFinalLine() || "...";
        document.getElementById("finalEcho").textContent = "I love you. Call me back when you can.";
        if (window.SignalLostAudio) {
          window.SignalLostAudio.resume();
          setTimeout(function () {
            window.SignalLostAudio.playEndingFoundSequence(function () {
              setTimeout(function () {
                document.body.style.transition = "background-color 6s ease, color 6s ease";
                document.body.style.backgroundColor = "#f5f5f8";
                document.body.style.color = "#1a1a2e";
              }, 800);
            });
          }, 1200);
        }
      })();
    </script>
  </body>
</html>
