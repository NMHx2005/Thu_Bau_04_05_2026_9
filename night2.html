<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGNAL LOST. Night 2</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css" />
    <link rel="stylesheet" href="css/jquery-overrides.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/phone.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/night.css" />
    <link rel="stylesheet" href="css/game-frame.css" />
    <link rel="stylesheet" href="css/night2-ui.css" />
    <style>
      .app-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 20px;
      }
      .app-btn {
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 16px;
        background: rgba(37, 37, 66, 0.85);
        color: #e8e8f0;
        cursor: pointer;
        text-align: center;
        font-size: 0.75rem;
      }
      .app-btn img {
        width: 56px;
        height: 56px;
        object-fit: contain;
        margin-bottom: 8px;
        display: inline-block;
      }
      .app-layer {
        position: absolute;
        inset: 0;
        background: #1a1a2e;
        z-index: 5;
        display: flex;
        flex-direction: column;
        padding: 12px;
      }
      .app-layer__top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .app-body {
        flex: 1;
        overflow-y: auto;
        font-size: 0.8rem;
        line-height: 1.45;
        color: #e8e8f0;
      }
      .phone-screen {
        position: relative;
      }
      .memory-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .memory-card {
        border: 1px solid rgba(108, 99, 255, 0.45);
        cursor: grab;
      }
      .memory-slot {
        margin-top: 14px;
        padding: 14px;
        border: 2px dashed rgba(255, 255, 255, 0.25);
        border-radius: 12px;
        text-align: center;
        color: #9898b0;
        font-size: 0.75rem;
      }
      .memory-rest {
        margin-top: 10px;
        text-align: center;
        font-size: 0.9rem;
        color: #e8e8f0;
        min-height: 1.2em;
      }
      .free-row {
        display: flex;
        gap: 8px;
        padding: 10px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(26, 26, 46, 0.95);
      }
      .free-input {
        flex: 1;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #1a1a2e;
        color: #e8e8f0;
        font-family: "Courier New", monospace;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body class="night-bedroom-page">
    <div id="eyeLidTop" class="eye-open" aria-hidden="true"></div>
    <div id="eyeLidBottom" class="eye-open" aria-hidden="true"></div>
    <div id="phase-apps" class="page-stage">
      <div class="phone-frame">
        <div class="phone-screen">
          <header class="phone-status">
            <span class="phone-status__time">2:47 AM</span>
            <span class="phone-status__battery"><span class="phone-status__battery-level"></span></span>
          </header>
          <div class="chat-header">
            <div class="chat-header__avatar"></div>
            <div class="chat-header__name">Unknown</div>
          </div>
          <div style="flex: 1; overflow: hidden; position: relative">
            <p style="padding: 0 16px; font-size: 0.7rem; color: #9898b0">Apps</p>
            <p id="appsBanner" class="night-hidden" style="padding: 0 16px; font-size: 0.7rem; color: #9898b0; line-height: 1.45" role="status" aria-live="polite"></p>
            <div class="app-grid">
              <button type="button" class="app-btn" data-app="photos">
                <img src="assets/images/App_photo.png" alt="" onerror="this.style.display='none'" /> Photos
              </button>
              <button type="button" class="app-btn" data-app="notes">
                <img src="assets/images/App_Note.png" alt="" onerror="this.style.display='none'" /> Notes
              </button>
              <button type="button" class="app-btn" data-app="browser">
                <img src="assets/images/App_Browser.png" alt="" onerror="this.style.display='none'" /> Browser
              </button>
              <button type="button" class="app-btn" data-app="voicemail">
                <img src="assets/images/App_Voicemail.png" alt="" onerror="this.style.display='none'" /> Voicemail
              </button>
            </div>
            <div id="appLayer" class="app-layer night-hidden">
              <div class="app-layer__top">
                <button type="button" class="n2-nav-btn n2-nav-btn--back" id="appClose">
                  <span class="n2-nav-btn__icon" aria-hidden="true">←</span>
                  <span>Back</span>
                </button>
                <span id="appTitle" class="app-layer__title">APP</span>
                <span class="app-layer__top-spacer" aria-hidden="true"></span>
              </div>
              <div class="app-body" id="appBody" aria-live="polite"></div>
            </div>
          </div>
          <button type="button" class="n2-action-btn" id="btnToMemory">
            Continue
          </button>
        </div>
      </div>
    </div>

    <div id="phase-memory" class="night-hidden page-stage">
      <div class="phone-frame">
        <div class="phone-screen">
          <header class="phone-status">
            <span class="phone-status__time">2:47 AM</span>
            <span class="phone-status__battery"><span class="phone-status__battery-level"></span></span>
          </header>
          <div class="chat-header">
            <div class="chat-header__avatar"></div>
            <div class="chat-header__name">Unknown</div>
          </div>
          <div style="flex: 1; overflow-y: auto; padding: 14px">
            <p style="font-size: 0.75rem; color: #9898b0; margin-top: 0">March 3rd. Put the memories in order.</p>
            <ul class="memory-list" id="memoryList"></ul>
            <div class="memory-slot memory-slot--framed" id="memoryFifth">what happened next</div>
            <div class="memory-rest" id="memoryRest"></div>
            <button type="button" class="n2-action-btn" id="btnVerifyMemory">
              Lock order
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="phase-chat" class="night-hidden page-stage">
      <div class="phone-frame">
        <div class="phone-screen" id="phoneScreen2">
          <header class="phone-status">
            <span class="phone-status__time">2:47 AM</span>
            <span class="phone-status__battery"><span class="phone-status__battery-level"></span></span>
          </header>
          <div class="chat-header">
            <div class="chat-header__avatar"></div>
            <div class="chat-header__name">Unknown</div>
          </div>
          <div class="chat-log" id="chatLog2"></div>
          <footer class="chat-choices" id="chatChoices2"></footer>
          <div class="free-row">
            <input type="text" class="free-input" id="freeInput" placeholder="Type a reply… Enter" autocomplete="off" />
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="js/gameFrame.js"></script>
    <script src="js/state.js"></script>
    <script src="js/stateNight3Extend.js"></script>
    <script>
      (function () {
        var S = window.SignalLostState;
        if (!S || !S.canEnterNight2 || !S.canEnterNight2()) {
          window.location.replace("night1.html");
        }
      })();
    </script>
    <script src="js/audio.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/night2.js"></script>
  </body>
</html>
